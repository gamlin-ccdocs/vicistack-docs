site_name: ViciStack Documentation
site_url: https://vicistack-docs.readthedocs.io
site_description: Production-tested VICIdial and Asterisk guides, configurations, and best practices from ViciStack.
site_author: ViciStack Team

repo_url: https://github.com/gamlin-ccdocs/vicistack-docs

theme:
  name: material
  palette:
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - "Call Center Abandonment Rate: Why Your Callers Hang Up and How to Fix It": "guides/call-center-abandonment-rate.md"
      - "Migrating from GoAutoDial to VICIdial: Step-by-Step": "guides/goautodial-to-vicidial-migration.md"
      - "VICIdial Real-Time Agent Coaching Setup Guide": "guides/vicidial-agent-coaching.md"
      - "VICIdial AMD Configuration: The Only Guide That Doesn't Waste Your Time": "guides/vicidial-amd-guide.md"
      - "VICIdial Asterisk Configuration: SIP, Codecs & NAT": "guides/vicidial-asterisk-configuration.md"
      - "VICIdial Auto-Dial Level Tuning by Campaign Type": "guides/vicidial-auto-dial-level-tuning.md"
      - "VICIdial Call Recording: Storage, Compliance & Archival": "guides/vicidial-call-recording.md"
      - "VICIdial Callback Automation: Setup & Best Practices": "guides/vicidial-callback-automation.md"
      - "VICIdial Carrier Selection: SIP Trunks, Rates & Quality": "guides/vicidial-carrier-selection.md"
      - "VICIdial Custom Report Building with MySQL Views and Queries": "guides/vicidial-custom-mysql-reports.md"
      - "VICIdial Kamailio Load Balancing for 100+ Agent Call Centers": "guides/vicidial-kamailio-load-balancing.md"
      - "VICIdial Lead Recycling Strategies That Actually Work": "guides/vicidial-lead-recycling.md"
      - "VICIdial for Outbound Sales: The Complete Playbook": "guides/vicidial-outbound-sales.md"
      - "VICIdial Pause Codes and Agent Accountability Systems": "guides/vicidial-pause-codes-accountability.md"
      - "Vicidial Political Campaigns": "guides/vicidial-political-campaigns.md"
      - "VICIdial Quality Assurance Scoring with Call Recordings": "guides/vicidial-qa-scoring.md"
      - "VICIdial Real-Time Agent Dashboard Customization Guide": "guides/vicidial-realtime-agent-dashboard.md"
      - "Vicidial Support": "guides/vicidial-support.md"
      - "VICIdial vs CallTools: Detailed Comparison for Call Centers": "guides/vicidial-vs-calltools.md"
  - About: about.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
  - attr_list

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://vicistack.com
      name: ViciStack Website
    - icon: fontawesome/solid/phone
      link: https://vicistack.com/free-audit/
      name: Free VICIdial Audit

copyright: "&copy; 2026 ViciStack. All guides available at <a href='https://vicistack.com'>vicistack.com</a>"
